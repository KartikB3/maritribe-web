<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maritribe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bottle-green: #0F4A3C;
      --jam: #551841;
      --jam-mid: #6B1740;
      --jam-light: #8B2252;
      --mint: #10B981;
      --ivory: #F5F2E6;
      --ivory-dark: #E7E3D6;
      --text-primary: #111827;
      --text-secondary: #6B7280;
      --text-tertiary: #9CA3AF;
      --border: #E5E7EB;
      --surface: #FFFFFF;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--ivory);
      min-height: 100vh;
      color: var(--text-primary);
    }

    /* ── Top Bar ── */
    .topbar {
      background: var(--bottle-green);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .topbar-logo {
      width: 34px; height: 34px;
      background: var(--ivory);
      border: 2px solid var(--jam);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none;
    }
    .topbar-logo span {
      font-size: 13px; font-weight: 900; color: var(--bottle-green);
      letter-spacing: -0.5px;
    }
    .topbar-title {
      font-size: 17px; font-weight: 800; color: #fff;
      text-decoration: none;
    }

    /* ── Container ── */
    .container {
      max-width: 560px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    /* ── Loading ── */
    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      gap: 14px;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--ivory-dark);
      border-top-color: var(--mint);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text {
      font-size: 13px;
      color: var(--text-tertiary);
      font-weight: 500;
    }

    /* ── Post Card ── */
    .post-card {
      background: var(--surface);
      border-radius: 18px;
      border: 1px solid var(--ivory-dark);
      overflow: hidden;
    }
    .post-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 18px 0;
    }
    .post-avatar {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: var(--bottle-green);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 800; font-size: 17px;
      flex-shrink: 0;
      overflow: hidden;
    }
    .post-avatar img {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .post-meta-author {
      font-size: 14px; font-weight: 700; color: var(--text-primary);
    }
    .post-meta-community {
      font-size: 12px; color: var(--jam-light); font-weight: 600;
    }
    .post-meta-time {
      font-size: 12px; color: var(--text-tertiary); font-weight: 400;
    }
    .post-body { padding: 14px 18px 16px; }
    .post-title {
      font-size: 17px;
      font-weight: 800;
      line-height: 1.4;
      margin-bottom: 8px;
      color: var(--text-primary);
    }
    .post-content {
      font-size: 14px;
      line-height: 1.7;
      color: var(--text-secondary);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .post-media {
      width: 100%;
      max-height: 400px;
      object-fit: cover;
      display: block;
    }
    .post-stats {
      display: flex;
      gap: 20px;
      padding: 14px 18px;
      border-top: 1px solid var(--ivory-dark);
      font-size: 13px;
      font-weight: 600;
      color: var(--text-tertiary);
    }
    .post-stats .stat {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .post-stats .stat-icon {
      font-size: 16px;
    }

    /* ── CTA Banner ── */
    .cta-banner {
      margin-top: 20px;
      background: linear-gradient(135deg, var(--jam-light), var(--jam));
      border-radius: 18px;
      padding: 28px 24px;
      text-align: center;
      color: #fff;
      position: relative;
      overflow: hidden;
    }
    .cta-banner::after {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 140px; height: 140px;
      border: 2px solid rgba(255,255,255,0.06);
      border-radius: 50%;
    }
    .cta-banner h2 {
      font-size: 19px;
      font-weight: 800;
      margin-bottom: 6px;
      position: relative;
    }
    .cta-banner p {
      font-size: 13px;
      opacity: 0.75;
      margin-bottom: 18px;
      line-height: 1.5;
      position: relative;
    }
    .cta-btn {
      display: inline-block;
      background: var(--mint);
      color: #fff;
      text-decoration: none;
      padding: 12px 28px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      position: relative;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 14px rgba(16,185,129,0.3);
    }
    .cta-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(16,185,129,0.4);
    }

    /* ── Community Card ── */
    .community-card {
      background: var(--surface);
      border-radius: 18px;
      border: 1px solid var(--ivory-dark);
      overflow: hidden;
    }
    .community-header {
      background: var(--bottle-green);
      padding: 40px 24px 48px;
      text-align: center;
      position: relative;
    }
    .community-header::before {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0; right: 0;
      height: 24px;
      background: var(--surface);
      border-radius: 24px 24px 0 0;
    }
    .community-icon {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: var(--ivory);
      border: 3px solid var(--jam);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 14px;
      font-size: 26px; color: var(--bottle-green); font-weight: 900;
    }
    .community-header h2 {
      font-size: 22px; font-weight: 800; color: #fff;
    }
    .community-body {
      padding: 20px 24px 28px;
      text-align: center;
    }
    .community-body .invite-tag {
      display: inline-block;
      background: rgba(85,24,65,0.08);
      color: var(--jam);
      font-size: 12px;
      font-weight: 700;
      padding: 5px 14px;
      border-radius: 20px;
      margin-bottom: 14px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .community-body .desc {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 22px;
    }

    /* ── Invite Page ── */
    .invite-card {
      background: var(--surface);
      border-radius: 18px;
      border: 1px solid var(--ivory-dark);
      text-align: center;
      overflow: hidden;
    }
    .invite-hero {
      background: var(--bottle-green);
      padding: 44px 24px 56px;
      position: relative;
    }
    .invite-hero::before {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0; right: 0;
      height: 24px;
      background: var(--surface);
      border-radius: 24px 24px 0 0;
    }
    .invite-hero::after {
      content: '';
      position: absolute;
      top: -40px; left: -40px;
      width: 180px; height: 180px;
      border: 2px solid rgba(255,255,255,0.05);
      border-radius: 50%;
    }
    .invite-hero .logo-circle {
      width: 72px; height: 72px;
      background: var(--ivory);
      border: 3px solid var(--jam);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 18px;
    }
    .invite-hero .logo-circle span {
      font-size: 26px; font-weight: 900; color: var(--bottle-green); letter-spacing: -1px;
    }
    .invite-hero h2 {
      font-size: 24px; font-weight: 800; color: #fff;
      position: relative;
    }
    .invite-body {
      padding: 20px 24px 28px;
    }
    .invite-body p {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 22px;
    }

    /* ── Error State ── */
    .error-card {
      background: var(--surface);
      border-radius: 18px;
      border: 1px solid var(--ivory-dark);
      padding: 52px 28px;
      text-align: center;
    }
    .error-icon { font-size: 48px; margin-bottom: 16px; }
    .error-card h2 {
      font-size: 19px; font-weight: 800; margin-bottom: 8px;
    }
    .error-card p {
      font-size: 14px; color: var(--text-secondary); line-height: 1.6;
    }

    /* ── Footer ── */
    .site-footer {
      text-align: center;
      padding: 20px;
      font-size: 11px;
      color: var(--text-tertiary);
    }
  </style>
</head>
<body>
  <!-- Top bar -->
  <div class="topbar">
    <a class="topbar-logo" href="/"><span>MT</span></a>
    <a class="topbar-title" href="/">Maritribe</a>
  </div>

  <div class="container" id="app">
    <div class="loader" id="loader">
      <div class="spinner"></div>
      <span class="loader-text">Loading...</span>
    </div>
  </div>

  <div class="site-footer">Built with care for maritime alumni</div>

  <script>
    const API_BASE = 'https://tribebackend.onrender.com';
    const app = document.getElementById('app');
    const loader = document.getElementById('loader');

    function hide(el) { el.style.display = 'none'; }

    function timeAgo(iso) {
      if (!iso) return '';
      const diff = Date.now() - new Date(iso).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 60) return mins + 'm ago';
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return hrs + 'h ago';
      const days = Math.floor(hrs / 24);
      if (days < 30) return days + 'd ago';
      return Math.floor(days / 30) + 'mo ago';
    }

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }

    function renderCTA(title, desc) {
      return `
        <div class="cta-banner">
          <h2>${title || 'Join the conversation'}</h2>
          <p>${desc || 'Download Maritribe to interact, join communities, and connect with maritime professionals.'}</p>
          <a class="cta-btn" href="/">Get Maritribe</a>
        </div>`;
    }

    function renderError(title, msg) {
      hide(loader);
      app.innerHTML = `
        <div class="error-card">
          <div class="error-icon">&#9875;</div>
          <h2>${esc(title)}</h2>
          <p>${esc(msg)}</p>
        </div>
        ${renderCTA()}`;
    }

    // ── Post View ──
    async function renderPost(postId) {
      try {
        const res = await fetch(API_BASE + '/public/posts/' + postId);
        if (res.status === 403) {
          renderError('Private Community', 'This post belongs to a private community and cannot be viewed on the web.');
          return;
        }
        if (!res.ok) {
          renderError('Post Not Found', 'This post may have been deleted or is no longer available.');
          return;
        }

        const post = await res.json();
        const initial = (post.author?.name || 'A').charAt(0).toUpperCase();
        const avatarInner = post.author?.profileImage
          ? '<img src="' + esc(post.author.profileImage) + '" alt="">'
          : initial;

        const mediaHtml = (post.mediaUrls && post.mediaUrls.length > 0)
          ? '<img class="post-media" src="' + esc(post.mediaUrls[0]) + '" alt="">'
          : '';

        document.title = (post.title || 'Post') + ' — Maritribe';

        hide(loader);
        app.innerHTML = `
          <div class="post-card">
            ${mediaHtml}
            <div class="post-header">
              <div class="post-avatar">${avatarInner}</div>
              <div>
                <div class="post-meta-author">${esc(post.author?.name)}</div>
                <div>
                  <span class="post-meta-community">${esc(post.community?.name || '')}</span>
                  <span class="post-meta-time">&middot; ${timeAgo(post.createdAt)}</span>
                </div>
              </div>
            </div>
            <div class="post-body">
              ${post.title ? '<div class="post-title">' + esc(post.title) + '</div>' : ''}
              <div class="post-content">${esc(post.body)}</div>
            </div>
            <div class="post-stats">
              <div class="stat"><span class="stat-icon">&#128079;</span> ${post.score || 0} claps</div>
              <div class="stat"><span class="stat-icon">&#128172;</span> ${post.commentsCount || 0} comments</div>
            </div>
          </div>
          ${renderCTA('Continue in the app', 'Open Maritribe to clap, comment, and join the discussion.')}`;
      } catch (e) {
        renderError('Something went wrong', 'Could not load this post. Please try again later.');
      }
    }

    // ── Community Invite View ──
    function renderCommunityInvite(slug) {
      const name = slug.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
      document.title = 'Join ' + name + ' — Maritribe';

      hide(loader);
      app.innerHTML = `
        <div class="community-card">
          <div class="community-header">
            <div class="community-icon">${name.charAt(0)}</div>
            <h2>${esc(name)}</h2>
          </div>
          <div class="community-body">
            <span class="invite-tag">Community Invite</span>
            <p class="desc">You've been invited to join <strong>${esc(name)}</strong> on Maritribe. Download the app to see posts, join discussions, and connect with members.</p>
            <a class="cta-btn" href="/">Get Maritribe</a>
          </div>
        </div>`;
    }

    // ── App Invite View ──
    function renderAppInvite() {
      document.title = 'Join Maritribe';
      hide(loader);
      app.innerHTML = `
        <div class="invite-card">
          <div class="invite-hero">
            <div class="logo-circle"><span>MT</span></div>
            <h2>You're invited!</h2>
          </div>
          <div class="invite-body">
            <p>A fellow maritime professional invited you to <strong>Maritribe</strong> — the community platform built for seafarers, alumni, and the maritime industry.</p>
            <a class="cta-btn" href="/">Get Maritribe</a>
          </div>
        </div>`;
    }

    // ── Router ──
    (function route() {
      const path = window.location.pathname;
      const segments = path.split('/').filter(Boolean);

      if (segments[0] === 'p' && segments[1]) {
        renderPost(segments[1]);
      } else if (segments[0] === 'c' && segments[1]) {
        renderCommunityInvite(segments[1]);
      } else if (segments[0] === 'invite') {
        renderAppInvite();
      } else {
        renderError('Page Not Found', "The page you're looking for doesn't exist.");
      }
    })();
  </script>
</body>
</html>
