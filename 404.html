<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maritribe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bottle-green: #0F4A3C;
      --jam: #551841;
      --mint: #10B981;
      --ivory: #F5F2E6;
      --text-primary: #111827;
      --text-secondary: #6B7280;
      --text-tertiary: #9CA3AF;
      --border: #E5E7EB;
      --surface: #FFFFFF;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--ivory);
      min-height: 100vh;
      color: var(--text-primary);
    }

    /* ── Top Bar ── */
    .topbar {
      background: linear-gradient(135deg, var(--bottle-green), var(--jam));
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .topbar-logo {
      width: 36px; height: 36px;
      background: var(--mint);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 800; color: #fff;
      text-decoration: none;
    }
    .topbar-title {
      font-size: 18px; font-weight: 800; color: #fff;
      text-decoration: none;
    }

    /* ── Container ── */
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    /* ── Loading ── */
    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      gap: 16px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--mint);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Post Card ── */
    .post-card {
      background: var(--surface);
      border-radius: 16px;
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .post-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 16px 0;
    }
    .post-avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--bottle-green), var(--jam));
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 16px;
      flex-shrink: 0;
    }
    .post-avatar img {
      width: 100%; height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }
    .post-meta-author {
      font-size: 14px; font-weight: 700; color: var(--text-primary);
    }
    .post-meta-community {
      font-size: 12px; color: var(--text-secondary);
    }
    .post-meta-time {
      font-size: 12px; color: var(--text-tertiary);
    }
    .post-body {
      padding: 14px 16px;
    }
    .post-title {
      font-size: 17px;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 8px;
      color: var(--text-primary);
    }
    .post-content {
      font-size: 14px;
      line-height: 1.6;
      color: var(--text-secondary);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .post-media {
      width: 100%;
      max-height: 400px;
      object-fit: cover;
    }
    .post-stats {
      display: flex;
      gap: 20px;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--text-tertiary);
    }
    .post-stats span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* ── CTA Banner ── */
    .cta-banner {
      margin-top: 20px;
      background: linear-gradient(135deg, var(--bottle-green), var(--jam));
      border-radius: 16px;
      padding: 28px 24px;
      text-align: center;
      color: #fff;
    }
    .cta-banner h2 {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .cta-banner p {
      font-size: 14px;
      opacity: 0.8;
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .cta-btn {
      display: inline-block;
      background: var(--mint);
      color: #fff;
      text-decoration: none;
      padding: 12px 28px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      transition: transform 0.15s;
    }
    .cta-btn:hover { transform: scale(1.04); }

    /* ── Community Card ── */
    .community-card {
      background: var(--surface);
      border-radius: 16px;
      border: 1px solid var(--border);
      text-align: center;
      padding: 32px 24px;
    }
    .community-icon {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--bottle-green), var(--jam));
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      font-size: 28px; color: #fff; font-weight: 800;
    }
    .community-card h2 {
      font-size: 22px; font-weight: 800; margin-bottom: 6px;
    }
    .community-card .desc {
      font-size: 14px; color: var(--text-secondary); line-height: 1.5;
      margin-bottom: 20px;
    }

    /* ── Error State ── */
    .error-card {
      background: var(--surface);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 48px 24px;
      text-align: center;
    }
    .error-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    .error-card h2 {
      font-size: 20px; font-weight: 700; margin-bottom: 8px;
    }
    .error-card p {
      font-size: 14px; color: var(--text-secondary); line-height: 1.5;
    }
  </style>
</head>
<body>
  <!-- Top bar -->
  <div class="topbar">
    <a class="topbar-logo" href="/">M</a>
    <a class="topbar-title" href="/">Maritribe</a>
  </div>

  <div class="container" id="app">
    <div class="loader" id="loader">
      <div class="spinner"></div>
      <span style="font-size:14px;color:var(--text-secondary)">Loading...</span>
    </div>
  </div>

  <script>
    const API_BASE = 'https://tribebackend.onrender.com';
    const app = document.getElementById('app');
    const loader = document.getElementById('loader');

    function hide(el) { el.style.display = 'none'; }

    function timeAgo(iso) {
      if (!iso) return '';
      const diff = Date.now() - new Date(iso).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 60) return mins + 'm ago';
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return hrs + 'h ago';
      return Math.floor(hrs / 24) + 'd ago';
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    function renderCTA() {
      return `
        <div class="cta-banner">
          <h2>Join the conversation</h2>
          <p>Download Maritribe to interact with this post, join communities, and connect with maritime professionals.</p>
          <a class="cta-btn" href="/">Get Maritribe</a>
        </div>`;
    }

    function renderError(title, msg) {
      hide(loader);
      app.innerHTML = `
        <div class="error-card">
          <div class="error-icon">&#9875;</div>
          <h2>${escapeHtml(title)}</h2>
          <p>${escapeHtml(msg)}</p>
        </div>
        ${renderCTA()}`;
    }

    // ── Post View ──
    async function renderPost(postId) {
      try {
        const res = await fetch(API_BASE + '/posts/' + postId + '/public');
        if (res.status === 403) {
          renderError('Private Community', 'This post belongs to a private community and cannot be viewed here.');
          return;
        }
        if (!res.ok) {
          renderError('Post Not Found', 'This post may have been deleted or is no longer available.');
          return;
        }

        const post = await res.json();
        const authorInitial = (post.author?.name || 'A').charAt(0).toUpperCase();
        const avatarContent = post.author?.profileImage
          ? '<img src="' + escapeHtml(post.author.profileImage) + '" alt="">'
          : authorInitial;
        const mediaHtml = (post.mediaUrls && post.mediaUrls.length > 0)
          ? '<img class="post-media" src="' + escapeHtml(post.mediaUrls[0]) + '" alt="Post media">'
          : '';

        document.title = (post.title || 'Post') + ' — Maritribe';

        hide(loader);
        app.innerHTML = `
          <div class="post-card">
            ${mediaHtml}
            <div class="post-header">
              <div class="post-avatar">${avatarContent}</div>
              <div>
                <div class="post-meta-author">${escapeHtml(post.author?.name)}</div>
                <div class="post-meta-community">${escapeHtml(post.community?.name || '')} &middot; <span class="post-meta-time">${timeAgo(post.createdAt)}</span></div>
              </div>
            </div>
            <div class="post-body">
              ${post.title ? '<div class="post-title">' + escapeHtml(post.title) + '</div>' : ''}
              <div class="post-content">${escapeHtml(post.body)}</div>
            </div>
            <div class="post-stats">
              <span>&#128079; ${post.score || 0} claps</span>
              <span>&#128172; ${post.commentsCount || 0} comments</span>
            </div>
          </div>
          ${renderCTA()}`;
      } catch (e) {
        renderError('Something went wrong', 'Could not load this post. Please try again later.');
      }
    }

    // ── Community Invite View ──
    function renderCommunityInvite(slug) {
      const name = slug.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
      document.title = 'Join ' + name + ' — Maritribe';

      hide(loader);
      app.innerHTML = `
        <div class="community-card">
          <div class="community-icon">${name.charAt(0)}</div>
          <h2>${escapeHtml(name)}</h2>
          <p class="desc">You've been invited to join this community on Maritribe. Download the app to participate in discussions.</p>
          <a class="cta-btn" href="/">Get Maritribe</a>
        </div>`;
    }

    // ── App Invite View ──
    function renderAppInvite() {
      document.title = 'Join Maritribe';
      hide(loader);
      app.innerHTML = `
        <div class="cta-banner">
          <h2>You've been invited!</h2>
          <p>A fellow maritime professional invited you to Maritribe — the social platform built for seafarers, alumni, and the maritime community.</p>
          <a class="cta-btn" href="/">Get Maritribe</a>
        </div>`;
    }

    // ── Router ──
    (function route() {
      const path = window.location.pathname;
      const segments = path.split('/').filter(Boolean);

      if (segments[0] === 'p' && segments[1]) {
        renderPost(segments[1]);
      } else if (segments[0] === 'c' && segments[1]) {
        renderCommunityInvite(segments[1]);
      } else if (segments[0] === 'invite') {
        renderAppInvite();
      } else {
        renderError('Page Not Found', 'The page you\'re looking for doesn\'t exist.');
      }
    })();
  </script>
</body>
</html>
