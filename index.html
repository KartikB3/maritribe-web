<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maritribe — The Maritime Community</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #0F4A3C 0%, #551841 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .card {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 48px 36px;
      max-width: 420px;
      text-align: center;
    }
    .logo {
      width: 72px; height: 72px;
      background: #10B981;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      font-size: 32px; font-weight: 700;
    }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .tagline { font-size: 15px; opacity: 0.8; margin-bottom: 32px; line-height: 1.5; }
    .btn {
      display: inline-block;
      background: #10B981;
      color: #fff;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      transition: transform 0.15s;
    }
    .btn:hover { transform: scale(1.04); }
    .footer { margin-top: 32px; font-size: 12px; opacity: 0.5; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">M</div>
    <h1>Maritribe</h1>
    <p class="tagline">The social platform for maritime professionals.<br>Connect with your alumni community.</p>
    <a class="btn" href="#">Coming Soon on Play Store</a>
    <p class="footer">Built with care for maritime alumni</p>
  </div>
</body>
</html>
